name: Build libxray.aar
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - name: Clone AndroidLibXrayLite
        run: git clone --recursive https://github.com/2dust/AndroidLibXrayLite
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build aar
        run: |
          cd AndroidLibXrayLite
          gomobile bind -v -androidapi 21 -target android/arm64 -o libxray.aar .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libxray
          path: AndroidLibXrayLite/libxray.aar
          
